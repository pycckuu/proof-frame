[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "risc0/=lib/risc0-ethereum/contracts/src/",
    "@openzeppelin/=lib/risc0-ethereum/lib/openzeppelin-contracts/",
    "world-id/=lib/world-id-contracts/src/",
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
